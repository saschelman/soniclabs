  <head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="images/Sonic%20Labs%20Logo.png" type="image/png" />
    <meta
      name="description"
      content="Kontakt zu Sonic Labs — Anfrage, Beratung und Support für Veranstaltungstechnik. Kontaktformular und Kontaktdaten."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Sonic Labs | Kontakt" />
    <meta
      property="og:description"
      content="Kontaktformular und Kontaktdaten für Beratung und Anfragen."
    />
    <meta
      property="og:image"
      content="https://soniclabs-r2.com/images/Sonic%20Labs%20Logo.png"
    />
    <link rel="canonical" href="https://soniclabs-r2.com/kontakt.html" />
  </head>
  <body class="is-preload">
    <div id="wrapper">
      <div id="main">
        <div class="inner">
          <header id="header">
            <a href="index.html" class="logo site-logo"
              ><img src="images/Sonic%20Labs%20Logo.png" alt="Sonic Labs"
            /></a>
            <ul class="icons">
              <li>
                <a
                  href="mailto:info@soniclabs-r2.com"
                  class="icon solid fa-envelope"
                  ><span class="label">E-Mail</span></a
                >
              </li>
              <li>
                <a href="tel:+4915786787956" class="icon solid fa-phone"
                  ><span class="label">Telefon</span></a
                >
              </li>
            </ul>
          </header>

          <section>
            <header class="main"><h1>Kontakt</h1></header>
            <p>
              Schreib mir: info@soniclabs-r2.com oder fülle das Kontaktformular
              aus
            </p>
            <form
              id="contact-form"
              method="POST"
              action="https://formspree.io/f/mdajyknw"
              accept-charset="UTF-8"
            >
              <div class="row gtr-uniform">
                <div class="col-6 col-12-xsmall">
                  <input type="text" name="name" id="name" placeholder="Name" />
                </div>
                <div class="col-6 col-12-xsmall">
                  <input
                    type="email"
                    name="_replyto"
                    id="email"
                    placeholder="E-Mail"
                  />
                </div>
                <div class="col-6 col-12-xsmall">
                  <input
                    type="tel"
                    name="phone"
                    id="phone"
                    placeholder="Telefon"
                  />
                </div>
                <div class="col-12">
                  <textarea
                    name="message"
                    id="message"
                    placeholder="Nachricht"
                    rows="6"
                  ></textarea>
                </div>
                <div class="col-12">
                  <ul class="actions">
                    <li>
                      <input type="submit" value="Senden" class="primary" />
                    </li>
                  </ul>
                </div>
              </div>
            </form>
          </section>
        </div>
      </div>

      <div id="sidebar">
        <div class="inner">

            </ul>
          </nav>
          <footer id="footer">
            <p class="copyright">&copy; SonicLabs R2</p>
          </footer>
        </div>
      </div>
