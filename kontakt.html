    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="is-preload">
    <div id="wrapper">
      <div id="main">
        <div class="inner">
          <header id="header">
            <a href="index.html" class="logo site-logo"
              ><img src="images/Sonic%20Labs%20Logo.png" alt="Sonic Labs"
            /></a>
            <ul class="icons">
              <li>
                <a
                  href="mailto:info@pa-anlagen.de"
                  class="icon solid fa-envelope"
                  ><span class="label">E-Mail</span></a
                >
              </li>
              <li>
                <a href="tel:+490000000000" class="icon solid fa-phone"
                  ><span class="label">Telefon</span></a
                >
              </li>
            </ul>
          </header>

          <section>
            <header class="main"><h1>Kontakt</h1></header>
            <p>Schreib mir: info@pa-anlagen.de oder ruf an: +49 000 000000</p>
            <form method="post" action="#">
              <div class="row gtr-uniform">
                <div class="col-6 col-12-xsmall">
                  <input type="text" name="name" id="name" placeholder="Name" />
                </div>
                <div class="col-6 col-12-xsmall">
                  <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="E-Mail"
                  />
                </div>
                <div class="col-12">
                  <textarea
                    name="message"
                    id="message"
                    placeholder="Nachricht"
                    rows="6"
                  ></textarea>
                </div>
                <div class="col-12">
                  <ul class="actions">
                    <li>
                      <input type="submit" value="Senden" class="primary" />
                    </li>
                  </ul>
                </div>
              </div>
            </form>
          </section>
        </div>
      </div>

        <div class="inner">
